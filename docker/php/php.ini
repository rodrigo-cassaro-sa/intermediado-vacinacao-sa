; ============================================================================
; docker/php/php.ini — configuração de produção do PHP.
; Erros vão para log (nunca para a tela). display_errors real é controlado
; também pelo APP_DEBUG no bootstrap.
; ============================================================================
display_errors = Off
log_errors = On
expose_php = Off

memory_limit = 256M
upload_max_filesize = 20M
post_max_size = 25M
max_execution_time = 60

date.timezone = America/Sao_Paulo

; Cookies de sessão seguros (reforço; o app também define via código).
session.cookie_httponly = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1
