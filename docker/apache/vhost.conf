# ============================================================================
# docker/apache/vhost.conf
# VirtualHost do Apache. DocumentRoot = /var/www/html/public (docs/05).
# Só a pasta public/ é exposta; app/, api/, database/, storage/ ficam fora.
# ============================================================================
<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Bloqueio explícito de acesso web a pastas de código/dados (defesa em profundidade).
    <DirectoryMatch "^/var/www/html/(app|api|database|storage|docker|docs|protocols|skills|specialty|prompts)">
        Require all denied
    </DirectoryMatch>

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
