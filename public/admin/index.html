<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Console de Testes — Imunização</title>
  <style>
    :root {
      --bg: #0f172a; --card: #1e293b; --line: #334155; --txt: #e2e8f0;
      --muted: #94a3b8; --pri: #2563eb; --ok: #16a34a; --err: #dc2626; --warn:#d97706;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--txt); font-size: 14px; }
    header { display:flex; align-items:center; justify-content:space-between;
      padding: 14px 20px; background: #0b1220; border-bottom: 1px solid var(--line); }
    header h1 { font-size: 16px; margin: 0; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 20px; display: grid;
      grid-template-columns: 1fr 1fr; gap: 16px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 10px;
      padding: 16px; }
    .card h2 { font-size: 14px; margin: 0 0 12px; color: var(--muted);
      text-transform: uppercase; letter-spacing: .04em; }
    .full { grid-column: 1 / -1; }
    label { display:block; font-size: 12px; color: var(--muted); margin: 8px 0 4px; }
    input, select, button { font: inherit; }
    input, select { width: 100%; padding: 8px 10px; background: #0b1220;
      border: 1px solid var(--line); border-radius: 6px; color: var(--txt); }
    button { cursor: pointer; padding: 8px 14px; border: 0; border-radius: 6px;
      background: var(--pri); color: #fff; font-weight: 600; }
    button.sec { background: #334155; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .row { display:flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
    .row > div { flex: 1; min-width: 120px; }
    .pill { display:inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; }
    .pill.ok { background: rgba(22,163,74,.2); color: #4ade80; }
    .pill.err { background: rgba(220,38,38,.2); color: #f87171; }
    .pill.off { background: #334155; color: var(--muted); }
    table { width:100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
    th, td { text-align:left; padding: 6px 8px; border-bottom: 1px solid var(--line); }
    th { color: var(--muted); font-weight: 600; }
    pre { background:#0b1220; border:1px solid var(--line); border-radius:8px;
      padding: 12px; overflow:auto; max-height: 320px; font-size: 12px; margin:0; }
    .muted { color: var(--muted); }
    .vacinas { display:flex; flex-direction:column; gap:4px; max-height:120px; overflow:auto;
      border:1px solid var(--line); border-radius:6px; padding:8px; }
    .vacinas label { display:flex; align-items:center; gap:8px; margin:0; color:var(--txt); }
    .vacinas input { width:auto; }
    .hide { display:none; }
  </style>
</head>
<body>
  <header>
    <h1>🩹 Console de Testes — Imunização (homologação)</h1>
    <div>
      <span class="muted">Banco:</span> <span id="healthPill" class="pill off">?</span>
      <button class="sec" onclick="checarHealth()">Health</button>
    </div>
  </header>

  <div class="wrap">
    <!-- LOGIN -->
    <div class="card" id="cardLogin">
      <h2>1. Login</h2>
      <div id="logadoInfo" class="hide">
        <p>Logado como <b id="usuarioNome"></b> (<span id="usuarioPerfil"></span>)</p>
        <button class="sec" onclick="logout()">Sair</button>
      </div>
      <div id="loginForm">
        <label>E-mail</label>
        <input id="loginEmail" value="rodrigo@saimunizacoes.com.br" />
        <label>Senha</label>
        <input id="loginSenha" type="password" placeholder="sua senha" />
        <div style="margin-top:12px"><button onclick="login()">Entrar</button></div>
      </div>
    </div>

    <!-- CLIENTES -->
    <div class="card">
      <h2>2. Cliente B2B</h2>
      <div class="row">
        <div><label>Razão social</label><input id="cliRazao" value="Empresa Teste LTDA" /></div>
        <div><label>CNPJ</label><input id="cliCnpj" value="11222333000181" /></div>
      </div>
      <div style="margin-top:12px" class="row">
        <button onclick="criarCliente()">Criar cliente</button>
        <button class="sec" onclick="listarClientes()">Listar</button>
      </div>
      <table id="tblClientes"></table>
    </div>

    <!-- CAMPANHAS -->
    <div class="card full">
      <h2>3. Campanha</h2>
      <div class="row">
        <div>
          <label>Cliente B2B</label>
          <select id="campCliente"><option value="">— carregue os clientes —</option></select>
        </div>
        <div>
          <label>Modalidade</label>
          <select id="campModalidade">
            <option value="in_company">in_company</option>
            <option value="rede_credenciada">rede_credenciada</option>
          </select>
        </div>
        <div><label>Nome</label><input id="campNome" value="Gripe 2026" /></div>
      </div>
      <div class="row" style="margin-top:8px">
        <div><label>Início</label><input id="campInicio" type="date" value="2026-07-10" /></div>
        <div><label>Fim</label><input id="campFim" type="date" value="2026-08-10" /></div>
        <div>
          <label>Vacinas <button class="sec" style="padding:2px 8px" onclick="carregarVacinas()">↻</button></label>
          <div class="vacinas" id="campVacinas"><span class="muted">clique em ↻</span></div>
        </div>
      </div>
      <div style="margin-top:12px" class="row">
        <button onclick="criarCampanha()">Criar campanha</button>
        <button class="sec" onclick="listarCampanhas()">Listar campanhas</button>
      </div>
      <table id="tblCampanhas"></table>
    </div>

    <!-- ELEGÍVEIS -->
    <div class="card full">
      <h2>4. Elegíveis (importar / listar)</h2>
      <div class="row">
        <div>
          <label>Campanha</label>
          <select id="elegCampanha"><option value="">— liste as campanhas —</option></select>
        </div>
      </div>
      <label>Cole os elegíveis (uma linha por pessoa: <span class="muted">cpf,nome,data_nascimento</span>)</label>
      <textarea id="elegCsv" rows="4" style="width:100%;padding:8px;background:#0b1220;border:1px solid var(--line);border-radius:6px;color:var(--txt)"
        placeholder="52998224725,Maria Silva,1990-05-10&#10;16899535009,João Souza,1985-11-02"></textarea>
      <div style="margin-top:12px" class="row">
        <button onclick="importarElegiveis()">Importar (JSON)</button>
        <button class="sec" onclick="listarElegiveis()">Listar elegíveis</button>
      </div>
      <p id="elegResumo" class="muted"></p>
      <table id="tblElegiveis"></table>
    </div>

    <!-- CREDENCIAL / PARCEIRO -->
    <div class="card full">
      <h2>5. Credencial de API + ingestão do parceiro</h2>
      <div class="row">
        <div>
          <label>Campanha</label>
          <select id="credCampanha"><option value="">— liste as campanhas —</option></select>
        </div>
        <div style="flex:0">
          <label>&nbsp;</label>
          <button onclick="emitirCredencial()">Emitir token (ingestao_b2b)</button>
        </div>
      </div>
      <label>Token emitido (cole aqui para testar; só aparece uma vez)</label>
      <input id="credToken" placeholder="token..." />
      <label style="margin-top:8px">Elegíveis para enviar via API do parceiro (cpf,nome,data_nascimento)</label>
      <textarea id="ingCsv" rows="3" style="width:100%;padding:8px;background:#0b1220;border:1px solid var(--line);border-radius:6px;color:var(--txt)"
        placeholder="529.982.247-25,Ana Costa,1992-03-01"></textarea>
      <div style="margin-top:12px"><button onclick="testarIngestaoParceiro()">Testar ingestão via API (Bearer)</button></div>
    </div>

    <!-- APLICAÇÃO -->
    <div class="card full">
      <h2>6. Registrar aplicação (vacinado)</h2>
      <div class="row">
        <div>
          <label>Campanha</label>
          <select id="aplicCampanha"><option value="">— liste as campanhas —</option></select>
        </div>
        <div style="flex:0"><label>&nbsp;</label><button class="sec" onclick="carregarAplicacao()">Carregar elegíveis/vacinas</button></div>
        <div style="flex:0"><label>&nbsp;</label><button class="sec" onclick="ativarCampanha()">Ativar campanha</button></div>
      </div>
      <div class="row">
        <div><label>Elegível (paciente)</label><select id="aplicElegivel"><option value="">—</option></select></div>
        <div><label>Vacina</label><select id="aplicVacina"><option value="">—</option></select></div>
        <div style="flex:0;min-width:90px"><label>Dose</label><input id="aplicDose" type="number" value="1" min="1" /></div>
      </div>
      <div class="row">
        <div><label>Lote</label><input id="aplicLote" value="ABC-2026-77" /></div>
        <div><label>Data/hora da aplicação</label><input id="aplicData" type="datetime-local" value="2026-07-15T10:00" /></div>
      </div>
      <div style="margin-top:12px"><button onclick="registrarAplicacao()">Registrar aplicação</button></div>
    </div>

    <!-- TABELA VERDADE -->
    <div class="card full">
      <h2>7. Tabela verdade / Dashboard</h2>
      <div class="row">
        <div>
          <label>Campanha</label>
          <select id="tvCampanha"><option value="">— liste as campanhas —</option></select>
        </div>
        <div style="flex:0"><label>&nbsp;</label><button onclick="verTabelaVerdade()">Tabela verdade</button></div>
        <div style="flex:0"><label>&nbsp;</label><button class="sec" onclick="verDashboard()">Dashboard</button></div>
        <div style="flex:0"><label>&nbsp;</label><button class="sec" onclick="exportarCsv()">Exportar CSV</button></div>
      </div>
      <p id="tvResumo" class="muted"></p>
      <table id="tblTabelaVerdade"></table>
    </div>

    <!-- RESPOSTA -->
    <div class="card full">
      <h2>Última resposta da API</h2>
      <pre id="saida">—</pre>
    </div>
  </div>

<script>
// ---------------------------------------------------------------------------
// Console de testes — vanilla JS + Fetch. Mesma origem: cookies de sessão são
// enviados automaticamente. Mutações enviam o header X-CSRF-Token.
// ---------------------------------------------------------------------------
let CSRF = null;

function log(obj) {
  document.getElementById('saida').textContent =
    typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2);
}

async function api(path, metodo = 'GET', corpo = null) {
  const opts = { method: metodo, headers: {}, credentials: 'same-origin' };
  if (corpo) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(corpo);
  }
  if (metodo !== 'GET' && CSRF) {
    opts.headers['X-CSRF-Token'] = CSRF;
  }
  const resp = await fetch('/api/v1' + path, opts);
  let dados;
  try { dados = await resp.json(); } catch (e) { dados = { erro: 'resposta não-JSON', status: resp.status }; }
  log(dados);
  return dados;
}

async function checarHealth() {
  const d = await api('/health');
  const pill = document.getElementById('healthPill');
  const ok = d && d.data && d.data.banco === 'ok';
  pill.className = 'pill ' + (ok ? 'ok' : 'err');
  pill.textContent = d?.data?.banco || 'erro';
}

async function login() {
  const d = await api('/interno/auth/login', 'POST', {
    email: document.getElementById('loginEmail').value,
    senha: document.getElementById('loginSenha').value,
  });
  if (d.success) {
    CSRF = d.data.csrf_token;
    document.getElementById('usuarioNome').textContent = d.data.usuario.nome;
    document.getElementById('usuarioPerfil').textContent = d.data.usuario.perfil;
    document.getElementById('loginForm').classList.add('hide');
    document.getElementById('logadoInfo').classList.remove('hide');
    listarClientes();
  }
}

async function logout() {
  await api('/interno/auth/logout', 'POST');
  CSRF = null;
  document.getElementById('loginForm').classList.remove('hide');
  document.getElementById('logadoInfo').classList.add('hide');
}

async function criarCliente() {
  await api('/interno/clientes', 'POST', {
    razao_social: document.getElementById('cliRazao').value,
    cnpj: document.getElementById('cliCnpj').value,
  });
  listarClientes();
}

async function listarClientes() {
  const d = await api('/interno/clientes');
  const tbl = document.getElementById('tblClientes');
  const sel = document.getElementById('campCliente');
  if (!d.success) return;
  const itens = d.data.itens || [];
  tbl.innerHTML = '<tr><th>ID</th><th>Razão social</th><th>CNPJ</th><th>Status</th></tr>' +
    itens.map(c => `<tr><td>${c.id}</td><td>${c.razao_social}</td><td>${c.cnpj}</td><td>${c.status}</td></tr>`).join('');
  sel.innerHTML = '<option value="">— selecione —</option>' +
    itens.map(c => `<option value="${c.id}">${c.razao_social} (#${c.id})</option>`).join('');
}

async function carregarVacinas() {
  const d = await api('/interno/vacinas');
  const box = document.getElementById('campVacinas');
  if (!d.success) return;
  box.innerHTML = (d.data.itens || []).map(v =>
    `<label><input type="checkbox" value="${v.id}" data-doses="${v.doses_padrao}"> ${v.nome} (${v.doses_padrao} dose(s))</label>`
  ).join('') || '<span class="muted">nenhuma vacina</span>';
}

async function criarCampanha() {
  const vacinas = [...document.querySelectorAll('#campVacinas input:checked')]
    .map(el => ({ vacina_id: Number(el.value), doses_previstas: Number(el.dataset.doses) }));
  await api('/interno/campanhas', 'POST', {
    cliente_b2b_id: Number(document.getElementById('campCliente').value),
    nome: document.getElementById('campNome').value,
    modalidade: document.getElementById('campModalidade').value,
    periodo_inicio: document.getElementById('campInicio').value,
    periodo_fim: document.getElementById('campFim').value,
    vacinas,
  });
  listarCampanhas();
}

async function listarCampanhas() {
  const d = await api('/interno/campanhas');
  const tbl = document.getElementById('tblCampanhas');
  if (!d.success) return;
  const itens = d.data.itens || [];
  tbl.innerHTML = '<tr><th>ID</th><th>Cliente</th><th>Nome</th><th>Modalidade</th><th>Período</th><th>Status</th></tr>' +
    itens.map(c => `<tr><td>${c.id}</td><td>${c.cliente}</td><td>${c.nome}</td><td>${c.modalidade}</td><td>${c.periodo_inicio} → ${c.periodo_fim}</td><td>${c.status}</td></tr>`).join('');
  // Popula os seletores de campanha das seções 4, 5, 6 e 7.
  const opts = '<option value="">— selecione —</option>' +
    itens.map(c => `<option value="${c.id}">${c.nome} (#${c.id})</option>`).join('');
  ['elegCampanha', 'credCampanha', 'aplicCampanha', 'tvCampanha'].forEach(idsel => {
    const el = document.getElementById(idsel); if (el) el.innerHTML = opts;
  });
}

async function carregarAplicacao() {
  const id = document.getElementById('aplicCampanha').value;
  if (!id) return log('Selecione uma campanha.');
  // Elegíveis da campanha.
  const de = await api(`/interno/campanhas/${id}/elegiveis`);
  const selE = document.getElementById('aplicElegivel');
  selE.innerHTML = (de.data?.itens || [])
    .map(e => `<option value="${e.id}">${e.nome} (${e.cpf}) — ${e.status}</option>`).join('') || '<option value="">sem elegíveis</option>';
  // Vacinas da campanha (via detalhe).
  const dc = await api(`/interno/campanhas/${id}`);
  const selV = document.getElementById('aplicVacina');
  selV.innerHTML = (dc.data?.vacinas || [])
    .map(v => `<option value="${v.vacina_id}">${v.nome}</option>`).join('') || '<option value="">sem vacinas</option>';
}

async function ativarCampanha() {
  const id = document.getElementById('aplicCampanha').value;
  if (!id) return log('Selecione uma campanha.');
  await api(`/interno/campanhas/${id}`, 'PUT', { status: 'ativa' });
  listarCampanhas();
}

async function registrarAplicacao() {
  const body = {
    elegivel_id: Number(document.getElementById('aplicElegivel').value),
    vacina_id: Number(document.getElementById('aplicVacina').value),
    dose: Number(document.getElementById('aplicDose').value),
    lote: document.getElementById('aplicLote').value,
    aplicado_em: document.getElementById('aplicData').value.replace('T', ' ') + ':00',
  };
  await api('/interno/aplicacoes', 'POST', body);
}

async function verTabelaVerdade() {
  const id = document.getElementById('tvCampanha').value;
  if (!id) return log('Selecione uma campanha.');
  const d = await api(`/interno/campanhas/${id}/tabela-verdade`);
  if (!d.success) return;
  const r = d.data.resumo || {};
  document.getElementById('tvResumo').textContent =
    `Pendentes: ${r.pendente||0} · Aplicados: ${r.aplicado||0} · Recusados: ${r.recusado||0} · Total: ${d.meta?.total||0}`;
  document.getElementById('tblTabelaVerdade').innerHTML =
    '<tr><th>CPF</th><th>Nome</th><th>Situação</th><th>Aplicações</th><th>Última</th></tr>' +
    (d.data.itens || []).map(i =>
      `<tr><td>${i.cpf}</td><td>${i.nome}</td><td>${i.situacao_elegivel}</td><td>${i.total_aplicacoes}</td><td>${i.ultima_aplicacao_em||'—'}</td></tr>`).join('');
}

function exportarCsv() {
  const id = document.getElementById('tvCampanha').value;
  if (!id) return log('Selecione uma campanha.');
  // GET com cookie de sessão (mesma origem) — dispara download pelo Content-Disposition.
  window.open(`/api/v1/interno/campanhas/${id}/exportar`, '_blank');
}

async function verDashboard() {
  const id = document.getElementById('tvCampanha').value;
  if (!id) return log('Selecione uma campanha.');
  const d = await api(`/interno/campanhas/${id}/dashboard`);
  if (d.success) {
    const x = d.data;
    document.getElementById('tvResumo').textContent =
      `Cobertura ${x.cobertura_percentual}% — Elegíveis: ${x.total_elegiveis} · Aplicados: ${x.aplicados} · Pendentes: ${x.pendentes} · Recusados: ${x.recusados}`;
  }
}

// Converte texto "cpf,nome,nascimento" (uma linha por pessoa) em array de objetos.
// Tolera aspas ao redor dos campos (ex.: "123","Nome","2000-01-01").
function parseElegiveis(texto) {
  const limpa = s => (s || '').trim().replace(/^"(.*)"$/, '$1').trim();
  return texto.split(/\r?\n/).map(l => l.trim()).filter(Boolean).map(linha => {
    const p = linha.split(/[;,](?=(?:[^"]*"[^"]*")*[^"]*$)/).map(limpa);
    return { cpf: p[0] || '', nome: p[1] || '', data_nascimento: p[2] || null };
  });
}

async function importarElegiveis() {
  const id = document.getElementById('elegCampanha').value;
  if (!id) return log('Selecione uma campanha (clique em Listar campanhas antes).');
  const elegiveis = parseElegiveis(document.getElementById('elegCsv').value);
  await api(`/interno/campanhas/${id}/elegiveis/importar`, 'POST', { elegiveis });
  listarElegiveis();
}

async function listarElegiveis() {
  const id = document.getElementById('elegCampanha').value;
  if (!id) return log('Selecione uma campanha.');
  const d = await api(`/interno/campanhas/${id}/elegiveis`);
  if (!d.success) return;
  const r = d.data.resumo || {};
  document.getElementById('elegResumo').textContent =
    `Pendentes: ${r.pendente||0} · Aplicados: ${r.aplicado||0} · Recusados: ${r.recusado||0} · Total: ${d.meta?.total||0}`;
  const itens = d.data.itens || [];
  document.getElementById('tblElegiveis').innerHTML =
    '<tr><th>CPF</th><th>Nome</th><th>Origem</th><th>Status</th></tr>' +
    itens.map(e => `<tr><td>${e.cpf}</td><td>${e.nome}</td><td>${e.origem}</td><td>${e.status}</td></tr>`).join('');
}

async function emitirCredencial() {
  const id = document.getElementById('credCampanha').value;
  if (!id) return log('Selecione uma campanha.');
  const d = await api('/interno/credenciais', 'POST', { tipo: 'ingestao_b2b', campanha_id: Number(id) });
  if (d.success) document.getElementById('credToken').value = d.data.token;
}

async function testarIngestaoParceiro() {
  const id = document.getElementById('credCampanha').value;
  const token = document.getElementById('credToken').value.trim();
  if (!id || !token) return log('Selecione a campanha e emita/cole um token.');
  const elegiveis = parseElegiveis(document.getElementById('ingCsv').value);
  const resp = await fetch(`/api/v1/parceiro/campanhas/${id}/elegiveis`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ elegiveis }),
  });
  log(await resp.json());
  listarElegiveis();
}

// Ao abrir, checa a saúde do serviço.
checarHealth();
</script>
</body>
</html>
